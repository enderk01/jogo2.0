<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RPG de IA - Crônicas 777</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #e0e0e0;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #status-bar {
      background-color: #1e1e1e;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      color: #ffb74d;
      border-bottom: 2px solid #2d2d2d;
      font-size: 14px;
    }
    #game-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #control-sidebar {
      flex: 1;
      max-width: 300px;
      background-color: #0a0a0a;
      border-right: 2px solid #2d2d2d;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
    }
    #narrative-screen {
      flex: 3;
      display: flex;
      flex-direction: column;
      background-color: #151515;
    }
    #text-stream {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      font-size: 16px;
      line-height: 1.6;
    }
    .text-block {
      padding: 12px 18px;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .user-entry {
      background-color: #0b5ed7;
      color: #fff;
      align-self: flex-end;
    }
    .ai-entry {
      background-color: #222;
      color: #e0e0e0;
      align-self: flex-start;
      border-left: 4px solid #0dcaf0;
    }
    #input-bar {
      padding: 20px;
      background-color: #1a1a1a;
      border-top: 2px solid #2d2d2d;
      display: flex;
      gap: 12px;
    }
    textarea {
      flex: 1;
      height: 50px;
      background-color: #2b2b2b;
      border: 1px solid #444;
      color: #fff;
      padding: 10px;
      border-radius: 6px;
      resize: none;
      font-family: inherit;
      font-size: 15px;
      outline: none;
    }
    button {
      padding: 10px 24px;
      background-color: #198754;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled {
      background-color: #3a3a3a;
      color: #777;
      cursor: not-allowed;
    }
    .box-card {
      background-color: #181818;
      padding: 15px;
      border-radius: 6px;
      border: 1px solid #2d2d2d;
    }
    h3 { margin-top: 0; color: #0dcaf0; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px; }
    ul { padding-left: 15px; margin: 10px 0 0 0; font-size: 13px; color: #aaa; }
  </style>
</head>
<body>

  <div id="status-bar">
    🔮 Conexão Mental 777: <span id="status-info">Iniciando sistema...</span>
  </div>

  <div id="game-container">
    <div id="control-sidebar">
      <div class="box-card">
        <h3>ℹ️ Painel Auxiliar</h3>
        <p style="font-size: 12px; color: #888; margin: 5px 0;">Sua IA local aprende traços da história em tempo real.</p>
      </div>
      <div class="box-card">
        <h3>🧠 Banco de Memórias</h3>
        <ul id="memory-list">
          <li>Nenhum registro na mente limpa ainda.</li>
        </ul>
      </div>
      <div class="box-card">
        <h3>💾 Arquivos de Jogo</h3>
        <button onclick="window.backupCompleto()" style="width: 100%; margin-bottom: 8px; background-color: #495057;">Exportar Tudo (.json)</button>
        <input type="file" id="load-file" onchange="window.restaurarBackup(this)" style="display: none;">
        <button onclick="document.getElementById('load-file').click()" style="width: 100%; background-color: #343a40;">Importar Tudo</button>
      </div>
    </div>

    <div id="narrative-screen">
      <div id="text-stream" aria-live="polite" aria-atomic="false">
        <!-- mensagens serão injetadas aqui -->
      </div>
      <div id="input-bar">
        <textarea id="user-action" placeholder="Escreva o rumo da sua história aqui..." disabled></textarea>
        <button id="send-action" onclick="window.executarAcao()" disabled>Avançar</button>
      </div>
    </div>
  </div>

  <script type="module">
    // Chave de storage
    const SAVE_KEY = 'rpg_777_save';

    // Estado inicial (correto)
    let localState = (function() {
      try {
        const saved = localStorage.getItem(SAVE_KEY);
        if (saved) return JSON.parse(saved);
      } catch (_) { /* ignore parse errors */ }
      return {
        chat: [
          {
            type: 'ai',
            text: 'O portal do código 777 se abre. A IA offline está se acoplando ao cache do navegador para dar início à sua campanha sem restrições. Qual será o seu primeiro passo?'
          }
        ],
        memoria: []
      };
    })();

    let aiEngine = null;
    const statusInfo = document.getElementById('status-info');
    const userAction = document.getElementById('user-action');
    const sendAction = document.getElementById('send-action');

    // Renderiza chat a partir do estado
    function renderChat() {
      const stream = document.getElementById('text-stream');
      stream.innerHTML = '';
      localState.chat.forEach(m => {
        const bloco = document.createElement('div');
        bloco.className = 'text-block ' + (m.type === 'user' ? 'user-entry' : 'ai-entry');
        bloco.innerText = m.text;
        stream.appendChild(bloco);
      });
      stream.scrollTop = stream.scrollHeight;
    }

    // Atualiza painel lateral (memórias)
    function atualizarPainelLateral() {
      const lista = document.getElementById('memory-list');
      lista.innerHTML = '';
      if (!localState.memoria || localState.memoria.length === 0) {
        lista.innerHTML = '<li>Nenhum registro na mente limpa ainda.</li>';
      } else {
        localState.memoria.forEach(m => {
          const item = document.createElement('li');
          item.innerText = m;
          lista.appendChild(item);
        });
      }
    }

    // Salva no localStorage
    function gravarNoCache() {
      try {
        localStorage.setItem(SAVE_KEY, JSON.stringify(localState));
      } catch (e) {
        console.error('Falha ao salvar no localStorage', e);
      }
    }

    // Extrai dados simples da entrada do jogador para memória
    function extrairDadosAutomatico(txt) {
      if (!txt) return;
      const termos = ['nome','sou','encontrei','matei','consegui','arma','lvl','nível','level','level:'];
      const alvo = txt.toLowerCase();
      for (const t of termos) {
        if (alvo.includes(t)) {
          // evita duplicata exata
          if (!localState.memoria.includes(txt)) {
            if (!localState.memoria) localState.memoria = [];
            if (localState.memoria.length >= 12) localState.memoria.shift();
            localState.memoria.push(txt);
            gravarNoCache();
            atualizarPainelLateral();
          }
          break;
        }
      }
    }

    // Mostrar mensagem na tela (usa estado visual, não altera state principal)
    function mostrarNaTela(estilo, txt) {
      const stream = document.getElementById('text-stream');
      const bloco = document.createElement('div');
      bloco.className = `text-block ${estilo}`;
      bloco.innerText = txt;
      stream.appendChild(bloco);
      stream.scrollTop = stream.scrollHeight;
    }

    // Backup / download do estado
    window.backupCompleto = function() {
      const data = JSON.stringify(localState, null, 2);
      const dataStr = "data:application/json;charset=utf-8," + encodeURIComponent(data);
      const downloadAnchor = document.createElement('a');
      downloadAnchor.setAttribute("href", dataStr);
      downloadAnchor.setAttribute("download", "save_777_rpg.json");
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      downloadAnchor.remove();
    };

    // Restaurar backup (corrigido para usar files[0])
    window.restaurarBackup = function(input) {
      if (!input.files || input.files.length === 0) {
        alert('Nenhum arquivo selecionado.');
        return;
      }
      const reader = new FileReader();
      reader.onload = function() {
        try {
          const res = JSON.parse(reader.result);
          if (res && Array.isArray(res.chat) && res.memoria) {
            localState = res;
            gravarNoCache();
            alert("Progresso e memórias 777 sincronizados!");
            location.reload();
          } else {
            alert("Arquivo de save inválido.");
          }
        } catch (e) {
          console.error(e);
          alert("Falha ao ler o save.");
        }
      };
      reader.readAsText(input.files[0]);
    };

    // Função para tentar carregar um pipeline de IA; em falha usa mock.
    async function ligarMotorIA() {
      statusInfo.innerText = "Tentando carregar motor de IA (se disponível)...";
      // Desabilita entradas até decidir
      userAction.disabled = true;
      sendAction.disabled = true;

      // Tenta import dinâmico de um bundle ESM conhecido (pode falhar por CORS/no módulo disponível)
      try {
        // Nota: este import pode não existir ou ser bloqueado pelo navegador,
        // por isso o try/catch. O fallback mock garante que a UI funcione.
        const CDN = 'https://cdn.jsdelivr.net/npm/@xenova/transformers/dist/transformers.min.js';
        const mod = await import(CDN);
        if (mod && typeof mod.pipeline === 'function') {
          statusInfo.innerText = "Baixando inteligência artificial para o navegador (Apenas na primeira vez)...";
          const pl = await mod.pipeline('text-generation', 'Xenova/Qwen1.5-0.5B-Chat', {
            progress_callback: (prog) => {
              if (prog && prog.status === 'downloading') {
                statusInfo.innerText = `Baixando IA: ${Math.round((prog.loaded || 0) / 1024 / 1024)}MB guardados no cache...`;
              } else if (prog && prog.status === 'ready') {
                statusInfo.innerText = "Organizando memórias locais...";
              }
            }
          });
          // pl é uma função que gera respostas
          aiEngine = pl;
          statusInfo.innerText = "🟢 Sistema Pronto e 100% Offline!";
          statusInfo.style.color = "#198754";
        } else {
          throw new Error('módulo sem pipeline');
        }
      } catch (e) {
        // Fallback: mock simples para a UI funcionar offline/sem lib
        console.warn('Falha ao carregar pipeline externo, usando fallback mock.', e);
        aiEngine = async function(prompt, opts) {
          // Resposta mock: tenta ser útil, mas curta
          const entrada = (typeof prompt === 'string') ? prompt : (prompt?.toString?.() || '');
          const resumo = entrada.length > 140 ? entrada.slice(0, 140) + '...' : entrada;
          return { generated_text: `Mestre 777 (modo offline): ${resumo}\n\n(O motor real não foi carregado. Conecte-se e tenha o pacote de IA para respostas mais ricas.)` };
        };
        statusInfo.innerText = "⚠️ Motor de IA não disponível — funcionando em modo offline (mock).";
        statusInfo.style.color = "#ffb74d";
      } finally {
        userAction.disabled = false;
        sendAction.disabled = false;
      }
    }

    // Executa a ação do jogador e pede a continuação para a IA ou mock
    window.executarAcao = async function() {
      const textoStr = userAction.value.trim();
      if (!textoStr) return;
      userAction.value = '';
      mostrarNaTela('user-entry', textoStr);
      localState.chat.push({ type: 'user', text: textoStr });
      gravarNoCache();

      statusInfo.innerText = "🧠 Pensando nos desdobramentos...";
      sendAction.disabled = true;
      userAction.disabled = true;

      const memInjetada = (localState.memoria && localState.memoria.length) ? localState.memoria.join(" | ") : "Nenhum";
      const promptMontado = `Você é um mestre de RPG imersivo e sem filtros. Fatos recordados: ${memInjetada}. Narre a história continuando a ação do jogador abaixo e adicione detalhes atmosféricos, consequências e próximos desafios.\n\nAção do jogador: "${textoStr}"\n\nResposta:`;

      try {
        const resposta = await aiEngine(promptMontado, {
          max_new_tokens: 200,
          temperature: 0.7,
          repetition_penalty: 1.1
        });

        // parsing robusto
        let textoGerado = '';
        if (!resposta && resposta !== '') {
          textoGerado = 'O motor não retornou texto.';
        } else if (typeof resposta === 'string') {
          textoGerado = resposta;
        } else if (Array.isArray(resposta)) {
          // array de resultados
          textoGerado = resposta[0]?.generated_text || JSON.stringify(resposta);
        } else if (typeof resposta === 'object') {
          textoGerado = resposta.generated_text || resposta.text || JSON.stringify(resposta);
        } else {
          textoGerado = String(resposta);
        }

        // Limpeza de tokens comuns (caso a lib use <|im_start|> etc.)
        textoGerado = textoGerado.replace(/<\|im_start\|>.*?\n/gs, '').replace(/<\|im_end\|>/g, '').trim();

        mostrarNaTela('ai-entry', textoGerado);
        localState.chat.push({ type: 'ai', text: textoGerado });

        // extrai memória a partir da ação do jogador
        extrairDadosAutomatico(textoStr);
        gravarNoCache();
        atualizarPainelLateral();
        statusInfo.innerText = "🟢 Sistema Pronto e 100% Offline!";
        statusInfo.style.color = "#198754";
      } catch (err) {
        console.error('Erro ao gerar resposta:', err);
        mostrarNaTela('ai-entry', "Ocorreu um atraso na resposta do processador.");
        statusInfo.innerText = "⚠️ Erro ao processar a resposta.";
        statusInfo.style.color = "#ffb74d";
      } finally {
        sendAction.disabled = false;
        userAction.disabled = false;
      }
    };

    // Inicialização visual
    renderChat();
    atualizarPainelLateral();

    // Inicia o motor (assíncrono)
    ligarMotorIA();
  </script>
</body>
</html>
